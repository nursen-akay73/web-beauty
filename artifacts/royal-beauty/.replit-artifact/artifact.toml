kind = "web"
previewPath = "/"
title = "Royal Güzellik"
version = "1.0.0"
id = "artifacts/royal-beauty"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25223

[services.development]
run = "pnpm --filter @workspace/royal-beauty run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/royal-beauty", "run", "build" ]
publicDir = "artifacts/royal-beauty/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25223"
BASE_PATH = "/"
